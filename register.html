<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EMBO Register</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">

<style>

/* SAME BASE */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at center, #121212 0%, #0f1115 100%);
    overflow:hidden;
}

/* SAME GLOW */
.circle1{
    position:absolute;
    width:320px;
    height:320px;
    background:radial-gradient(circle, #ff3b30 0%, #b71c1c 60%, transparent 80%);
    border-radius:50%;
    filter:blur(60px);
    top:-80px;
    left:-80px;
    opacity:0.9;
}

.circle2{
    position:absolute;
    width:280px;
    height:280px;
    background:radial-gradient(circle, #ff1744 0%, #8e0000 60%, transparent 80%);
    border-radius:50%;
    filter:blur(70px);
    bottom:-80px;
    right:-80px;
    opacity:0.85;
}

/* SAME CARD */
.card{
    width:400px;
    padding:40px;
    text-align:center;

    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    border-radius:25px;
    color:white;
}

/* INPUTS SAME LOGIN */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,0.08);
    color:white;
    outline:none;
}

input:focus{
    border:1px solid #ff3b30;
    box-shadow:0 0 10px rgba(255,59,48,0.4);
}

/* BUTTON SAME */
button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#ff3b30;
    color:white;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(255,59,48,0.4);
}

h2{
    margin-bottom:15px;
}

</style>
</head>

<body>

<div class="circle1"></div>
<div class="circle2"></div>

<div class="card">

    <div class="logo">🚑</div>

    <h2>Create Account</h2>

    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="register()">Register</button>

</div>

<script>

function register(){

    let name=document.getElementById("name").value;
    let email=document.getElementById("email").value;
    let pass=document.getElementById("password").value;

    if(name==="" || email==="" || pass===""){
        alert("Fill all fields");
        return;
    }

    localStorage.setItem("embo_email", email);

    alert("Account Created 🚑");

    window.location.href="login.html";
}

</script>

</body>
</html>
