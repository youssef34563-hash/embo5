<!DOCTYPE html>
<html>
<head>
    <title>EMBO Live Map</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:#0f1115;
            color:white;
        }

        /* العنوان */
        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 15px;
            background:#1b1f2a;
        }

        .btn{
            padding:10px 15px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            background:#E53935;
            color:white;
        }

        /* الماب أصغر */
        #map{
            width:90%;
            height:400px;
            margin:20px auto;
            border-radius:15px;
            border:2px solid #2a2f3a;
        }
    </style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <h3>🚑 Live Ambulance Map</h3>

    <button class="btn" onclick="goHome()">
        ⬅ Home
    </button>
</div>

<!-- MAP -->
<div id="map"></div>

<script>

// ================= BACK BUTTON =================
function goHome(){
    window.location.href = "index.html";
}

// ================= MAP =================
let map = L.map('map').setView([30.0444, 31.2357], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'&copy; OpenStreetMap'
}).addTo(map);

let userMarker;

// ================= GET REAL LOCATION =================
navigator.geolocation.getCurrentPosition(function(pos){

    let lat = pos.coords.latitude;
    let lng = pos.coords.longitude;

    map.setView([lat, lng], 15);

    userMarker = L.marker([lat, lng])
        .addTo(map)
        .bindPopup("📍 Your Live Location")
        .openPopup();

});

// ================= FAKE AMBULANCES =================
let ambulances = [
    {id:1},
    {id:2},
    {id:3}
];

// 👇 مهم: خليهم قريبين من مكانك الحقيقي
navigator.geolocation.getCurrentPosition(function(pos){

    let lat = pos.coords.latitude;
    let lng = pos.coords.longitude;

    map.setView([lat, lng], 15); // zoom قوي

    ambulances.forEach((a, i) => {

        let marker = L.marker([
            lat + (Math.random()-0.5)*0.01,
            lng + (Math.random()-0.5)*0.01
        ]).addTo(map)
        .bindPopup("🚑 Ambulance #" + a.id)
        .openPopup();

        // حركة بسيطة
        setInterval(() => {
            let newLat = marker.getLatLng().lat + (Math.random()-0.5)*0.001;
            let newLng = marker.getLatLng().lng + (Math.random()-0.5)*0.001;
            marker.setLatLng([newLat, newLng]);
        }, 800);
    });

});

// ================= ADD AMBULANCES =================
ambulances.forEach(a => {

    let marker = L.marker([a.lat, a.lng])
        .addTo(map)
        .bindPopup("🚑 Ambulance #" + a.id);

    move(marker);

});

</script>

</body>
</html>
